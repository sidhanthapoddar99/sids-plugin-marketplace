# docker/compose.no-ports.yaml — overlay.
# Removes host ports — for prod behind a reverse proxy that joins the internal network.
# Usage: docker compose -f docker/compose.yaml -f docker/compose.prod.yaml -f docker/compose.no-ports.yaml up -d

services:
  backend:
    ports: !reset []

  frontend:
    ports: !reset []

  nginx:
    ports: !reset []

  postgres:
    ports: !reset []

  redis:
    ports: !reset []
