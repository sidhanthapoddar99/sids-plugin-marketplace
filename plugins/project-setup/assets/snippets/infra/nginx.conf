# infra/nginx/nginx.conf — routes /api/* to backend container, serves the SPA otherwise.
# Mounted read-only into the nginx container; same /api/* contract Vite proxies in dev.

events { worker_connections 1024; }

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

  upstream backend {
    server backend:8000;          # compose service name
  }

  server {
    listen 80;
    server_name _;

    # API
    location /api/ {
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
    }

    # WebSockets — collaboration / SSE / etc.
    location /ws/ {
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_read_timeout 3600s;
    }

    # Frontend SPA fallback
    location / {
      root /usr/share/nginx/html;
      index index.html;
      try_files $uri $uri/ /index.html;

      # cache hashed assets aggressively, html lightly
      location ~* \.(js|css|woff2|png|jpg|svg|gif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
      }
      location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache";
      }
    }
  }
}
