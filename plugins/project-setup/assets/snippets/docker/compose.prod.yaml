# docker/compose.prod.yaml — config overlay: production hardening.
#   ctl up app edge --config=prod              (--config=prod auto-uses .env.production)
#   ctl up app edge --config=prod --config=traefik   (behind external Traefik)
# Swaps build→image tags, adds resource limits + restart policy. Base stays port-less,
# so there is no separate "no-ports" overlay — just don't add --config=expose in prod.

services:
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY:-OWNER/REPO}/backend:${VERSION:-latest}
    # Replace `build:` from base with `image:` for prod
    build: !reset null
    env_file:
      - ../.env.production
    deploy:
      resources:
        limits:
          memory: 1G

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY:-OWNER/REPO}/frontend:${VERSION:-latest}
    build: !reset null
    deploy:
      resources:
        limits:
          memory: 256M

  postgres:
    deploy:
      resources:
        limits:
          memory: 2G
    # Optional: pin to a node label for managed deployments
    # deploy:
    #   placement:
    #     constraints: [node.labels.db == true]
