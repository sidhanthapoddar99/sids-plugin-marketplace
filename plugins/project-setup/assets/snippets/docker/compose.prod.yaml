# docker/compose.prod.yaml — a STANDALONE config: the hardened production stack.
#
#   ctl up prod                     # the whole prod stack (detached, builds/pulls images)
#   ctl up prod --modifier traefik  # prod behind an external Traefik proxy
#   ctl up prod --modifier expose   # prod with nginx published on $NGINX_PORT
#
# A config REPLACES base, so this file is SELF-CONTAINED (it re-declares every service). That
# is the deliberate "redundancy but simpler" trade of the standalone model — prod reads top to
# bottom with no mental overlay merge. Differences from base: pinned `image:` tags instead of
# `build:`, resource limits + restart policy, and secrets from ../.env.production.
#
# Secrets: edit ../.env.production (real prod values — never committed). `ctl up prod` also
# auto-loads ../.env.prod if you prefer that name (docker-up.sh: --env-file .env.<config>).
# Stays port-less; publish via --modifier expose / traefik. Run from the repo root.

name: ${COMPOSE_PROJECT_NAME:-myapp}

services:
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY:-OWNER/REPO}/backend:${VERSION:-latest}
    restart: unless-stopped
    env_file:
      - ../.env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - internal

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY:-OWNER/REPO}/frontend:${VERSION:-latest}
    restart: unless-stopped
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - ../infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - internal

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C.UTF-8"
    volumes:
      - ${DATA_DIR:-../data}/postgres/pgdata:/var/lib/postgresql/data
      - ../infra/postgres/init:/docker-entrypoint-initdb.d:ro
    deploy:
      resources:
        limits:
          memory: 2G
    # Optional: pin to a node label for managed/swarm deployments
    #   placement:
    #     constraints: [node.labels.db == true]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD}
        --appendonly yes
        --appendfsync everysec
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - ${DATA_DIR:-../data}/redis/data:/data
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - internal

networks:
  internal:
    driver: bridge
