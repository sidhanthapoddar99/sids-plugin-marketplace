# docker/compose.m.expose.yaml — MODIFIER (`--modifier expose`).
#
# Publishes nginx (the edge) to the host — the safe default for running the whole stack
# locally behind the reverse proxy. nginx is in base, so this overlays cleanly:
#
#   ctl up --modifier expose
#   # raw: docker compose -f docker/compose.base.yaml -f docker/compose.m.expose.yaml up -d --build
#
# The app then answers at http://localhost:${NGINX_PORT} (default 8080). backend, frontend,
# postgres and redis stay internal-only — reach the app through nginx. To publish the data
# layer (for host dev) use `expose_data`; to publish everything (debug) use `expose_all`.

services:
  nginx:
    ports:
      - "${NGINX_PORT:-8080}:80"
