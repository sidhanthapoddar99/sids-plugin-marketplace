# docker/compose.base.yaml — base. The WHOLE stack, NO host ports, internal network only.
#
# PROFILE-LESS: every service here just runs. `ctl up` (bare) brings up all of them
# (at ≤5 services you almost always want the whole stack). Nothing is reachable from the
# host until you add an expose modifier.
#
# Two ways to vary it (see runtime/docker-overview.md for the model):
#   • config   — a STANDALONE scenario that REPLACES this file (compose.<name>.yaml):
#       data   compose.data.yaml   — just postgres + redis (the data layer alone)
#       prod   compose.prod.yaml   — the hardened production stack (ctl up prod)
#   • modifier — a cross-cutting OVERLAY layered on top (compose.m.<name>.yaml):
#       expose       compose.m.expose.yaml       — nginx only (the edge; run the stack behind the proxy)
#       expose_data  compose.m.expose_data.yaml  — postgres + redis ports (what `ctl dev` needs)
#       expose_all   compose.m.expose_all.yaml   — every service on its own port (debug)
#       traefik      compose.m.traefik.yaml      — join an external Traefik proxy
#
# Driven from the repo root via `ctl up [config] [--modifier "a,b"]`; the raw form
# (run FROM THE REPO ROOT so ../ resolves against docker/) is:
#   docker compose -f docker/compose.base.yaml up -d --build
#
# Internal ports (8000 backend, etc.) are fixed conventions — written plainly here and in
# infra/nginx/nginx.conf, never parameterised. Only the published host port varies (in the
# expose modifiers). `name:` sets the compose project name (health lookups respect it).

name: ${COMPOSE_PROJECT_NAME:-myapp}

services:
  backend:
    build: ../apps/backend
    restart: unless-stopped
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # [ADAPT] App healthcheck — uncomment + point at your liveness route so `ctl health` is
    # meaningful and depends_on: service_healthy works. Use a tool already IN the image:
    #   python image:  test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
    #   has curl:      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
    # healthcheck:
    #   test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
    #   interval: 30s
    #   timeout: 5s
    #   retries: 3
    #   start_period: 20s
    networks:
      - internal

  frontend:
    build:
      context: ../apps/frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_APP_ENV: ${APP_ENV:-development}
    restart: unless-stopped
    depends_on:
      - backend
    # [ADAPT] App healthcheck — for an SSR server (Next standalone) hit its port; for a static
    # build served by nginx the nginx healthcheck below already covers it.
    #   node image:    test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - ../infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    healthcheck:
      # busybox wget (in the alpine image); / proxies through to the apps.
      test: ["CMD-SHELL", "wget -qO- http://localhost/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - internal

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C.UTF-8"
    volumes:
      - ${DATA_DIR:-../data}/postgres/pgdata:/var/lib/postgresql/data
      - ../infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD}
        --appendonly yes
        --appendfsync everysec
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - ${DATA_DIR:-../data}/redis/data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - internal

networks:
  internal:
    driver: bridge
