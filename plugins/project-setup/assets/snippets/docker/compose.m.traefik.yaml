# docker/compose.m.traefik.yaml — MODIFIER (`--modifier traefik`).
#   ctl up prod --modifier traefik        # production stack behind an external Traefik
#   ctl up --modifier traefik             # base stack behind Traefik
# Joins the external `traefik-proxy` network and adds Traefik labels on the edge (nginx).
# nginx is in base, so it's always present — no profile needed. Don't stack with `expose`
# (Traefik terminates ingress; you don't also publish the host port).

services:
  nginx:
    networks:
      - traefik-proxy
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-proxy"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-myapp}.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-myapp}.entrypoints=websecure"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-myapp}.tls.certresolver=letsencrypt"
      - "traefik.http.services.${COMPOSE_PROJECT_NAME:-myapp}.loadbalancer.server.port=80"

networks:
  traefik-proxy:
    external: true
    name: traefik-proxy
