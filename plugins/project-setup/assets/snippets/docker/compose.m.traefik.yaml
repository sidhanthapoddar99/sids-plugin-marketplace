# docker/compose.m.traefik.yaml — MODIFIER (--traefik).  ctl up app edge --config=prod --traefik
# Joins external `traefik-proxy` network, adds Traefik labels on the edge service (nginx).
# Pair with the `edge` profile so nginx is actually started.

services:
  nginx:
    networks:
      - traefik-proxy
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-proxy"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-myapp}.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-myapp}.entrypoints=websecure"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-myapp}.tls.certresolver=letsencrypt"
      - "traefik.http.services.${COMPOSE_PROJECT_NAME:-myapp}.loadbalancer.server.port=80"

networks:
  traefik-proxy:
    external: true
    name: traefik-proxy
