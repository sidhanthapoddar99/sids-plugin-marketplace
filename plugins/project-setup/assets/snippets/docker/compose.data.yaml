# docker/compose.data.yaml — a STANDALONE config (config axis of `ctl up`).
#
# A config REPLACES the base file rather than overlaying it: `ctl up data` runs
# `docker compose -f docker/compose.data.yaml up`, so ONLY what's declared here comes up —
# just the data layer (postgres + redis), no apps, no nginx. This is the "spin up one slice"
# escape hatch the profile-less model uses instead of a data-only profile. Modifiers still
# layer on top: `ctl up data --modifier expose_data` publishes the data ports for an external
# client. (`ctl dev` does the same bring-up by service name, so you rarely need this directly —
# it's here as the worked example of a standalone config.)
#
# Self-contained: it re-declares the network. Run from the repo root so ../ resolves.

name: ${COMPOSE_PROJECT_NAME:-myapp}

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C.UTF-8"
    volumes:
      - ${DATA_DIR:-../data}/postgres/pgdata:/var/lib/postgresql/data
      - ../infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD}
        --appendonly yes
        --appendfsync everysec
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - ${DATA_DIR:-../data}/redis/data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - internal

networks:
  internal:
    driver: bridge
