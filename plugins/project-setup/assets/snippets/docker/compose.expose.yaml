# docker/compose.expose.yaml — config overlay.  ctl up <profile…> --config=expose
# Publishes host ports. Internal ports are fixed conventions; host ports are ${VAR}-driven.
# Only ports for services that actually start are applied — so `ctl up --config=expose`
# (core only) exposes just the data ports; backend/frontend entries are ignored.
# `ctl dev` layers this automatically when it brings up the data core for host apps.

services:
  backend:
    ports:
      - "${PYTHON_PORT:-8000}:8000"
  frontend:
    ports:
      - "${FRONTEND_PORT:-3000}:80"
  nginx:
    ports:
      - "${NGINX_PORT:-8080}:80"
  postgres:
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
  redis:
    ports:
      - "${REDIS_PORT:-6379}:6379"
