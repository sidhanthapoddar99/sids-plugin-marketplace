# docker/compose.yaml — base.
# All services declared. No host ports. Internal network only.
# Overlays add ports (compose.dev.yaml) or production overrides (compose.prod.yaml).

services:
  backend:
    build: ../apps/backend
    container_name: ${COMPOSE_PROJECT_NAME:-myapp}-backend
    restart: unless-stopped
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  frontend:
    build:
      context: ../apps/frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_APP_ENV: ${APP_ENV:-development}
    container_name: ${COMPOSE_PROJECT_NAME:-myapp}-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-myapp}-nginx
    restart: unless-stopped
    volumes:
      - ../infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - internal

  postgres:
    image: pgvector/pgvector:pg16
    container_name: ${COMPOSE_PROJECT_NAME:-myapp}-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C.UTF-8"
    volumes:
      - ${DATA_DIR:-../data}/postgres/pgdata:/var/lib/postgresql/data
      - ../infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-myapp}-redis
    restart: unless-stopped
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD}
        --appendonly yes
        --appendfsync everysec
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - ${DATA_DIR:-../data}/redis/data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - internal

networks:
  internal:
    driver: bridge
